<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabTranscode - Transcriptor Musical Esquemático</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4CAF50;
            --accent-hover: #45a049;
            --border-color: #333;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            color: var(--accent-color);
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Diapasón Canvas */
        .fretboard-container {
            width: 100%;
            overflow-x: auto;
            text-align: center;
        }
        canvas {
            background-color: #2c2c2c;
            border-radius: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* Controles */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button, select {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: var(--font-main);
        }

        button:hover, select:hover {
            background-color: var(--accent-hover);
        }

        select {
            background-color: #333;
            border: 1px solid #555;
        }

        /* Bloques de código/esquemas */
        pre, .schematic-output {
            font-family: var(--font-mono);
            background-color: #000;
            padding: 15px;
            border-radius: 4px;
            color: #4CAF50;
            overflow-x: auto;
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap; /* Permite que secuencias largas bajen de línea */
        }

        /* Para que las tablaturas no hagan wrap y mantengan formato */
        .tab-block {
            white-space: pre;
        }

        .export-btn { background-color: #2196F3; }
        .export-btn:hover { background-color: #1976D2; }
        .danger-btn { background-color: #f44336; }
        .danger-btn:hover { background-color: #d32f2f; }

        @media (max-width: 600px) {
            button, select { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TABTRANSCODE</h1>
    
    <div class="panel">
        <h2>1. Diapasón de Guitarra (Entrada)</h2>
        <div class="fretboard-container">
            <canvas id="fretboard" width="850" height="160"></canvas>
        </div>
        <div class="controls">
            <button class="danger-btn" onclick="borrarUltimaNota()">Deshacer Última Nota</button>
            <button class="danger-btn" onclick="limpiarTodo()">Limpiar Todo</button>
        </div>
    </div>

    <div class="panel">
        <h2>2. Melodía Original (Guitarra)</h2>
        <pre id="tab-output" class="tab-block">
e|--
B|--
G|--
D|--
A|--
E|--</pre>
    </div>

    <div class="panel">
        <h2>3. Transcripción Esquemática</h2>
        <div class="controls" style="justify-content: flex-start; margin-bottom: 15px;">
            <select id="instrument-select" onchange="actualizarTranscripcion()">
                <option value="charango">Charango (Tablatura)</option>
                <option value="ronroco">Ronroco (Tablatura)</option>
                <option value="ukelele">Ukelele (Tablatura)</option>
                <option value="bajo">Bajo (Tablatura)</option>
                <option value="armonica">Armónica (Secuencia)</option>
                <option value="concertina">Concertina Anglo 20 (Secuencia)</option>
                <option value="quena">Quena (Esquema Visual)</option>
            </select>
            <button class="export-btn" onclick="exportarTXT()">Exportar a TXT</button>
        </div>
        <div id="transcription-output" class="schematic-output">
            </div>
    </div>
</div>

<script>
    // ========== ESTADO DE LA APLICACIÓN ==========
    let melodia = []; 

    // Afinaciones base (notas MIDI de las cuerdas al aire)
    const tunings = {
        guitar:   [40, 45, 50, 55, 59, 64], // E2, A2, D3, G3, B3, E4
        charango: [67, 72, 64, 69, 76],     // G4, C5, E4, A4, E5
        ronroco:  [55, 60, 64, 69, 74],     // G3, C4, E4, A4, D5
        ukelele:  [67, 72, 76, 79],         // G4, C5, E4, A4
        bajo:     [28, 33, 38, 43]          // E1, A1, D2, G2
    };

    // Nombres de cuerdas para renderizar tablaturas de otros instrumentos (De aguda a grave en el dibujo)
    const tabConfigs = {
        charango: { strings: 5, tuning: tunings.charango, names: ['E','A','E','C','G'] },
        ronroco:  { strings: 5, tuning: tunings.ronroco,  names: ['D','A','E','C','G'] },
        ukelele:  { strings: 4, tuning: tunings.ukelele,  names: ['A','E','C','G'] },
        bajo:     { strings: 4, tuning: tunings.bajo,     names: ['G','D','A','E'] }
    };

    // Función genérica para encontrar el traste óptimo
    function findFingering(noteMidi, tuning, maxFret = 12) {
        let best = { string: -1, fret: 99 };
        for (let s = 0; s < tuning.length; s++) {
            const openNote = tuning[s];
            const fret = noteMidi - openNote;
            if (fret >= 0 && fret <= maxFret) {
                // Priorizar trastes más bajos
                if (fret < best.fret || (fret === best.fret && s < best.string)) {
                    best = { string: s, fret: fret };
                }
            }
        }
        if (best.string === -1) return null;
        return { cuerda: best.string, traste: best.fret }; // 0-based index
    }

    // ========== MAPEOS ESQUEMÁTICOS ==========

    // 1. ARMÓNICA (Secuencia Numérica)
    const harmonicaChart = {
        1: { blow: 48, draw: 50 }, 2: { blow: 50, draw: 52 }, 3: { blow: 52, draw: 53 },
        4: { blow: 53, draw: 55 }, 5: { blow: 55, draw: 57 }, 6: { blow: 57, draw: 59 },
        7: { blow: 59, draw: 60 }, 8: { blow: 60, draw: 62 }, 9: { blow: 62, draw: 64 },
        10:{ blow: 64, draw: 65 }
    };
    function generarEsquemaArmonica() {
        let secuencia = [];
        melodia.forEach(nota => {
            let encontrada = false;
            for (let h=1; h<=10; h++) {
                if (harmonicaChart[h].blow === nota.midi) { secuencia.push(`${h}`); encontrada=true; break; }
                if (harmonicaChart[h].draw === nota.midi) { secuencia.push(`(${h})`); encontrada=true; break; }
            }
            if(!encontrada) secuencia.push("[?]"); // Requiere bending o overblow
        });
        return secuencia.join("  -  ");
    }

    // 2. CONCERTINA ANGLO 20 (C/G Layout)
    // Formato: [Mano-Fila-Botón Acción] -> ej. [Izq-Arriba-3 Cerrar]
    const concertinaMap = {
        // Mano Izquierda - Fila Arriba (G)
        48: "[Izq-Sup-1 Abrir]", 55: "[Izq-Sup-1 Cerrar]", // C3 / G3
        59: "[Izq-Sup-2 Cerrar]", 55: "[Izq-Sup-2 Abrir]", // B3 / G3 (Ajustado según mapa común)
        62: "[Izq-Sup-3 Cerrar]", 60: "[Izq-Sup-3 Abrir]", // D4 / C4
        65: "[Izq-Sup-4 Cerrar]", 64: "[Izq-Sup-4 Abrir]", // F4 / E4
        69: "[Izq-Sup-5 Cerrar]", 67: "[Izq-Sup-5 Abrir]", // A4 / G4
        // Mano Izquierda - Fila Abajo (C)
        57: "[Izq-Inf-1 Cerrar]", 59: "[Izq-Inf-1 Abrir]", // A3 / B3
        66: "[Izq-Inf-2 Cerrar]", 62: "[Izq-Inf-2 Abrir]", // F#4 / D4
        69: "[Izq-Inf-3 Cerrar]", 67: "[Izq-Inf-3 Abrir]", // A4 / G4
        72: "[Izq-Inf-4 Cerrar]", 71: "[Izq-Inf-4 Abrir]", // C5 / B4
        76: "[Izq-Inf-5 Cerrar]", 74: "[Izq-Inf-5 Abrir]", // E5 / D5
        // Mano Derecha - Fila Arriba (G)
        71: "[Der-Sup-1 Cerrar]", 72: "[Der-Sup-1 Abrir]", // B4 / C5
        74: "[Der-Sup-2 Cerrar]", 76: "[Der-Sup-2 Abrir]", // D5 / E5
        77: "[Der-Sup-3 Cerrar]", 79: "[Der-Sup-3 Abrir]", // F5 / G5
        81: "[Der-Sup-4 Cerrar]", 84: "[Der-Sup-4 Abrir]", // A5 / C6
        83: "[Der-Sup-5 Cerrar]", 88: "[Der-Sup-5 Abrir]", // B5 / E6
        // Mano Derecha - Fila Abajo (C)
        78: "[Der-Inf-1 Cerrar]", 79: "[Der-Inf-1 Abrir]", // F#5 / G5
        81: "[Der-Inf-2 Cerrar]", 83: "[Der-Inf-2 Abrir]", // A5 / B5
        84: "[Der-Inf-3 Cerrar]", 86: "[Der-Inf-3 Abrir]", // C6 / D6
        88: "[Der-Inf-4 Cerrar]", 91: "[Der-Inf-4 Abrir]", // E6 / G6
        90: "[Der-Inf-5 Cerrar]", 95: "[Der-Inf-5 Abrir]"  // F#6 / B6
    };
    function generarEsquemaConcertina() {
        let secuencia = melodia.map(nota => {
            return concertinaMap[nota.midi] || `[Nota ${nota.nombreOriginal} fuera de rango]`;
        });
        return secuencia.join("  ➔  ");
    }

    // 3. QUENA (Esquema Visual de Agujeros)
    // Leyenda: [Pulgar | 1 2 3 4 5 6] -> ● Tapado, ○ Destapado, ◐ Medio
    const quenaMap = {
        60: "Do4  [● | ●●●●●●]",
        62: "Re4  [● | ●●●●●○]",
        64: "Mi4  [● | ●●●●○○]",
        65: "Fa4  [● | ●●●◐○○]", // Posición cruzada/medio agujero
        66: "Fa#4 [● | ●●●○○○]",
        67: "Sol4 [● | ●●○○○○]",
        69: "La4  [● | ●○○○○○]",
        71: "Si4  [● | ○○○○○○]",
        72: "Do5  [○ | ●●●●●○]", // 2da Octava
        74: "Re5  [○ | ●●●●○○]",
        76: "Mi5  [○ | ●●●○○○]",
        77: "Fa5  [○ | ●●◐○○○]",
        79: "Sol5 [○ | ●○○○○○]",
        81: "La5  [○ | ○○○○○○]"
    };
    function generarEsquemaQuena() {
        let secuencia = melodia.map(nota => {
            return quenaMap[nota.midi] || `${nota.nombreOriginal} [Fuera de rango]`;
        });
        // Para la quena, devolvemos una lista vertical para que el esquema se vea claro
        return secuencia.join("\n");
    }

    // ========== GENERADORES DE TABLATURA ==========

    function generarTablaturaEsquematica(instrumento) {
        const config = tabConfigs[instrumento];
        if (!config) return "Esquema no disponible.";

        // Inicializar líneas (ej. de aguda a grave visualmente)
        let lineas = [];
        for (let i = 0; i < config.strings; i++) {
            lineas.push(`${config.names[i]}|--`);
        }

        melodia.forEach(nota => {
            const fingering = findFingering(nota.midi, config.tuning, 14);
            const trasteStr = fingering ? fingering.traste.toString() : 'X';
            const longitudBloque = Math.max(trasteStr.length + 2, 4); 

            for (let i = 0; i < config.strings; i++) {
                // Mapear índice lógico al índice visual (invertimos para que la aguda quede arriba)
                const indiceVisual = (config.strings - 1) - i;

                if (fingering && i === fingering.cuerda) {
                    lineas[indiceVisual] += `${trasteStr}`.padEnd(longitudBloque - 2, '-') + `--`;
                } else {
                    lineas[indiceVisual] += '-'.repeat(longitudBloque);
                }
            }
        });

        return lineas.join('\n');
    }

    // Utilidad extra para obtener el nombre de la nota para logs/UI
    function getNoteName(noteMidi) {
        const noteNames = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
        const octave = Math.floor(noteMidi / 12) - 1;
        const noteIndex = noteMidi % 12;
        return `${noteNames[noteIndex]}${octave}`;
    }

    // ========== LÓGICA DEL DIAPASÓN (CANVAS) ==========
    const canvas = document.getElementById('fretboard');
    const ctx = canvas.getContext('2d');
    const totalFrets = 12; 
    const totalStrings = 6;
    const stringNames = ['e', 'B', 'G', 'D', 'A', 'E'];
    
    const paddingX = 40;
    const paddingY = 25;
    const stringSpacing = (canvas.height - paddingY * 2) / (totalStrings - 1);
    const fretWidth = (canvas.width - paddingX * 2) / totalFrets;

    function dibujarDiapason() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#3e2723";
        ctx.fillRect(paddingX, paddingY - 10, canvas.width - paddingX * 2, canvas.height - paddingY * 2 + 20);

        ctx.fillStyle = "#d7ccc8";
        ctx.fillRect(paddingX - 10, paddingY - 10, 10, canvas.height - paddingY * 2 + 20);

        ctx.strokeStyle = "#9e9e9e";
        ctx.lineWidth = 3;
        for (let i = 1; i <= totalFrets; i++) {
            const x = paddingX + i * fretWidth;
            ctx.beginPath(); ctx.moveTo(x, paddingY - 10); ctx.lineTo(x, canvas.height - paddingY + 10); ctx.stroke();
        }

        ctx.fillStyle = "#ffffff";
        [3, 5, 7, 9, 12].forEach(fret => {
            const x = paddingX + (fret - 0.5) * fretWidth;
            const y = canvas.height / 2;
            if (fret === 12) {
                ctx.beginPath(); ctx.arc(x, y - 15, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x, y + 15, 4, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
            }
        });

        for (let i = 0; i < totalStrings; i++) {
            const y = paddingY + i * stringSpacing;
            ctx.lineWidth = 1 + (i * 0.5);
            ctx.strokeStyle = "#e0e0e0";
            ctx.beginPath(); ctx.moveTo(paddingX - 10, y); ctx.lineTo(canvas.width - paddingX + fretWidth, y); ctx.stroke();

            ctx.fillStyle = "#4CAF50";
            ctx.font = "14px Arial";
            ctx.fillText(stringNames[i], 10, y + 5);
        }

        ctx.fillStyle = "#aaa";
        ctx.font = "12px Arial";
        for (let i = 0; i <= totalFrets; i++) {
            const x = paddingX + (i === 0 ? -15 : (i - 0.5) * fretWidth);
            ctx.fillText(i.toString(), x, canvas.height - 2);
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        let fret = 0;
        if (x > paddingX) fret = Math.ceil((x - paddingX) / fretWidth);
        if (fret > totalFrets) return;

        let stringGraphicIndex = Math.round((y - paddingY) / stringSpacing);
        if (stringGraphicIndex < 0 || stringGraphicIndex > 5) return;

        const logicalStringIndex = 5 - stringGraphicIndex; 
        const noteMidi = tunings.guitar[logicalStringIndex] + fret;

        melodia.push({
            cuerdaGrafica: stringGraphicIndex,
            traste: fret,
            midi: noteMidi,
            nombreOriginal: getNoteName(noteMidi)
        });

        actualizarTablaturaEntrada();
        actualizarTranscripcion();
    });

    // ========== LÓGICA DE INTERFAZ ==========

    function actualizarTablaturaEntrada() {
        const tabOutput = document.getElementById('tab-output');
        let lineas = [`e|--`, `B|--`, `G|--`, `D|--`, `A|--`, `E|--`];

        melodia.forEach(nota => {
            const trasteStr = nota.traste.toString();
            const longitudBloque = Math.max(trasteStr.length + 2, 4);

            for (let i = 0; i < 6; i++) {
                if (i === nota.cuerdaGrafica) {
                    lineas[i] += `${trasteStr}`.padEnd(longitudBloque - 2, '-') + `--`;
                } else {
                    lineas[i] += '-'.repeat(longitudBloque);
                }
            }
        });

        tabOutput.textContent = lineas.join('\n');
    }

    function actualizarTranscripcion() {
        const container = document.getElementById('transcription-output');
        const instrumento = document.getElementById('instrument-select').value;
        
        if (melodia.length === 0) {
            container.innerHTML = '<span style="color: #888;">[ Añade notas en el diapasón para ver el esquema ]</span>';
            // Remover la clase tab-block si estaba puesta
            container.classList.remove('tab-block');
            return;
        }

        let salidaEsquematica = "";
        
        // Determinar qué generador usar
        if (['charango', 'ronroco', 'ukelele', 'bajo'].includes(instrumento)) {
            salidaEsquematica = generarTablaturaEsquematica(instrumento);
            container.classList.add('tab-block'); // Forzar renderizado exacto para tabs
        } else {
            container.classList.remove('tab-block'); // Permitir flex/wrap en secuencias
            if (instrumento === 'armonica') {
                salidaEsquematica = generarEsquemaArmonica();
            } else if (instrumento === 'concertina') {
                salidaEsquematica = generarEsquemaConcertina();
            } else if (instrumento === 'quena') {
                salidaEsquematica = generarEsquemaQuena();
            }
        }

        container.textContent = salidaEsquematica;
    }

    function borrarUltimaNota() {
        if (melodia.length > 0) {
            melodia.pop();
            actualizarTablaturaEntrada();
            actualizarTranscripcion();
        }
    }

    function limpiarTodo() {
        melodia = [];
        actualizarTablaturaEntrada();
        actualizarTranscripcion();
    }

    function exportarTXT() {
        if (melodia.length === 0) {
            alert("No hay melodía para exportar.");
            return;
        }

        const select = document.getElementById('instrument-select');
        const instrumentoTxt = select.options[select.selectedIndex].text;
        
        let contenido = "========================================\n";
        contenido += " TABTRANSCODE - EXPORTACIÓN ESQUEMÁTICA\n";
        contenido += "========================================\n\n";
        
        contenido += "MELODÍA ORIGINAL (Guitarra):\n";
        contenido += "----------------------------------------\n";
        contenido += document.getElementById('tab-output').textContent + "\n\n";

        contenido += `TRANSCRIPCIÓN: ${instrumentoTxt.toUpperCase()}\n`;
        contenido += "----------------------------------------\n";
        contenido += document.getElementById('transcription-output').textContent + "\n";

        const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `TabTranscode_${instrumentoTxt.split(' ')[0]}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    window.onload = () => {
        dibujarDiapason();
        actualizarTranscripcion();
    };
</script>
</body>
</html>
